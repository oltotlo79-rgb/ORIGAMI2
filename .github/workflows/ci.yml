name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run lint

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - name: Rust tests
        shell: bash
        env:
          RUST_BACKTRACE: "1"
          CARGO_TERM_COLOR: always
        run: |
          set -o pipefail
          cargo test --workspace --locked --all-targets --no-fail-fast 2>&1 | tee cargo-test.log
      - name: Upload Rust test log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: rust-test-log-${{ matrix.os }}
          path: cargo-test.log
          if-no-files-found: ignore
      - name: Rust Clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --locked --all-targets --all-features -- -D warnings 2>&1 | tee cargo-clippy.log
      - name: Upload Rust Clippy log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: rust-clippy-log-${{ matrix.os }}
          path: cargo-clippy.log
          if-no-files-found: ignore
      - uses: actions/setup-node@v5
        if: runner.os == 'macOS'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install frontend dependencies for macOS bundle check
        if: runner.os == 'macOS'
        working-directory: apps/desktop
        run: npm ci
      - name: Build unsigned macOS app bundle
        if: runner.os == 'macOS'
        working-directory: apps/desktop
        run: npm run tauri -- build --bundles app

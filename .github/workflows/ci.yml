name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-advisory-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.90.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.11.1
      - name: Audit npm lockfile against the registry advisory service
        working-directory: apps/desktop
        run: npm audit --package-lock-only --audit-level=low
      - name: Audit Cargo.lock against a commit-pinned RustSec database offline
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-audit --version 0.22.2 --locked
          database="$RUNNER_TEMP/advisory-db"
          git clone --filter=blob:none --no-checkout https://github.com/rustsec/advisory-db.git "$database"
          git -C "$database" checkout --detach b5fc89b8be99e96f79194d8a6f11e9b4143b99f0
          test "$(git -C "$database" rev-parse HEAD)" = b5fc89b8be99e96f79194d8a6f11e9b4143b99f0
          audit_report="$RUNNER_TEMP/rustsec-audit.json"
          cargo audit --db "$database" --no-fetch --json > "$audit_report"
          allowed_warnings_file="$RUNNER_TEMP/rustsec-allowed-warnings.txt"
          review_report="$RUNNER_TEMP/rustsec-warning-review.json"
          node .github/scripts/verify_rustsec_warning_ledger.mjs "$audit_report" "$review_report" > "$allowed_warnings_file"
          mapfile -t allowed_warnings < "$allowed_warnings_file"
          ignore_args=()
          for advisory in "${allowed_warnings[@]}"; do
            [[ "$advisory" =~ ^RUSTSEC-[0-9]{4}-[0-9]{4}$ ]]
            ignore_args+=(--ignore "$advisory")
          done
          test "${#ignore_args[@]}" -eq 36
          cargo audit --db "$database" --no-fetch --deny warnings "${ignore_args[@]}"
      - name: Retain RustSec exception review evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rustsec-warning-review
          path: ${{ runner.temp }}/rustsec-warning-review.json
          if-no-files-found: error
          retention-days: 7

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Audit production CSP permissions secrets dependency licenses and diagnostics privacy
        id: production-security
        shell: bash
        run: |
          set -o pipefail
          {
            npm run build
            node ../../.github/scripts/verify_desktop_bundle_csp.mjs dist
            node ../../.github/scripts/verify_production_security_contract.mjs dist
            node ../../.github/scripts/verify_diagnostics_privacy.mjs
          } 2>&1 | tee "$RUNNER_TEMP/production-security.log"
      - name: Annotate production security audit failure
        if: failure() && steps.production-security.outcome == 'failure'
        shell: bash
        run: |
          message="$(tail -n 40 "$RUNNER_TEMP/production-security.log" 2>/dev/null | tr '\n' ' ' | cut -c1-4000)"
          message="${message//'%'/'%25'}"
          message="${message//$'\r'/'%0D'}"
          message="${message//$'\n'/'%0A'}"
          echo "::error title=Production security audit failed::${message:-audit failed before diagnostics log creation}"
      - name: Upload production security audit failure evidence
        if: failure() && steps.production-security.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: production-security-failure
          path: ${{ runner.temp }}/production-security.log
          if-no-files-found: warn
          retention-days: 7
      - name: Test formal release workflow and local artifact contract
        run: node --test ../../.github/tests/formal-release.test.mjs
      - name: Generate and verify credential-free release dry-run artifacts
        run: node ../../.github/scripts/run_release_dry_run.mjs
      - name: Validate generated static, textured, and animated GLB
        run: npm run test:gltf-validator
      - name: Install headless Chromium for Khronos Sample Viewer
        run: npx --no-install playwright install --with-deps chromium
      - name: Audit primary UI accessibility in Chromium
        id: accessibility-browser
        env:
          ORIGAMI2_A11Y_ARTIFACT_DIRECTORY: ${{ runner.temp }}/accessibility-browser
        run: npm run test:a11y-browser
      - name: Upload accessibility browser failure evidence
        if: failure() && steps.accessibility-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: accessibility-browser-failure
          path: ${{ runner.temp }}/accessibility-browser
          if-no-files-found: error
          retention-days: 7
      - name: Run diagnostics dialog browser E2E with a mock native picker boundary
        id: diagnostics-browser
        working-directory: apps/desktop
        env:
          ORIGAMI2_DIAGNOSTICS_BROWSER_ARTIFACT_DIRECTORY: ${{ runner.temp }}/diagnostics-browser
        run: npm run test:diagnostics-browser
      - name: Upload diagnostics dialog browser failure evidence
        if: failure() && steps.diagnostics-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: diagnostics-browser-failure
          path: ${{ runner.temp }}/diagnostics-browser
          if-no-files-found: error
          retention-days: 7
      - name: Verify even-cycle automatic candidates in Chromium
        id: even-cycle-browser
        working-directory: apps/desktop
        env:
          ORIGAMI2_EVEN_CYCLE_BROWSER_ARTIFACT_DIRECTORY: ${{ runner.temp }}/even-cycle-browser
        run: npm run test:even-cycle-browser
      - name: Verify production C6 dyadic panel lifecycle in Chromium
        id: dyadic-panel-browser
        working-directory: apps/desktop
        run: npm run test:dyadic-panel-browser
      - name: Verify all named technique instruction exports in Chromium
        id: named-technique-instruction-export-browser
        working-directory: apps/desktop
        run: npm run test:miura-instruction-export-browser
      - name: Verify full App instruction export routing in Chromium
        id: app-instruction-export-browser
        working-directory: apps/desktop
        run: npm run test:app-instruction-export-browser
      - name: Upload even-cycle browser failure evidence
        if: failure() && steps.even-cycle-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: even-cycle-browser-failure
          path: ${{ runner.temp }}/even-cycle-browser
          if-no-files-found: error
          retention-days: 7
      - name: Verify live locale switching for major features in Chromium
        id: locale-browser
        env:
          ORIGAMI2_LOCALE_BROWSER_ARTIFACT_DIRECTORY: ${{ runner.temp }}/locale-browser
        run: npm run test:locale-browser
      - name: Upload locale browser failure evidence
        if: failure() && steps.locale-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: locale-browser-failure
          path: ${{ runner.temp }}/locale-browser
          if-no-files-found: error
          retention-days: 7
      - name: Run project save recovery and close browser E2E with mock native boundaries
        id: project-lifecycle-browser
        working-directory: apps/desktop
        env:
          ORIGAMI2_PROJECT_LIFECYCLE_ARTIFACT_DIRECTORY: ${{ runner.temp }}/project-lifecycle-browser
        run: npm run test:project-lifecycle-browser
      - name: Upload project lifecycle browser failure evidence
        if: failure() && steps.project-lifecycle-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: project-lifecycle-browser-failure
          path: ${{ runner.temp }}/project-lifecycle-browser
          if-no-files-found: error
          retention-days: 7
      - name: Verify automatic edge intersection normalization in Chromium
        id: automatic-intersection-browser
        working-directory: apps/desktop
        env:
          ORIGAMI2_AUTOMATIC_INTERSECTION_ARTIFACT_DIRECTORY: ${{ runner.temp }}/automatic-intersection-browser
        run: npm run test:automatic-intersection-browser
      - name: Verify C6 balloon cycle persistence and tamper rejection in Chromium
        working-directory: apps/desktop
        run: npm run test:balloon-cycle-persistence-browser
      - name: Upload automatic intersection browser failure evidence
        if: failure() && steps.automatic-intersection-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: automatic-intersection-browser-failure
          path: ${{ runner.temp }}/automatic-intersection-browser
          if-no-files-found: error
          retention-days: 7
      - name: Verify cross-session recent projects privacy and invalidation in Chromium
        id: recent-projects-browser
        env:
          ORIGAMI2_RECENT_PROJECTS_ARTIFACT_DIRECTORY: ${{ runner.temp }}/recent-projects-browser
        run: npm run test:recent-projects-browser
      - name: Upload recent projects browser failure evidence
        if: failure() && steps.recent-projects-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: recent-projects-browser-failure
          path: ${{ runner.temp }}/recent-projects-browser
          if-no-files-found: error
          retention-days: 7
      - name: Run production 3D keyboard selection and fold pointer browser E2E
        id: fold-preview-browser
        working-directory: apps/desktop
        env:
          ORIGAMI2_FOLD_PREVIEW_ARTIFACT_DIRECTORY: ${{ runner.temp }}/fold-preview-browser
        run: npm run test:fold-preview-browser
      - name: Upload 3D interaction browser failure evidence
        if: failure() && steps.fold-preview-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fold-preview-browser-failure
          path: ${{ runner.temp }}/fold-preview-browser
          if-no-files-found: error
          retention-days: 7
      - name: Measure 10000-edge Canvas and 10000-triangle software WebGL frame budgets
        id: render-performance-browser
        working-directory: apps/desktop
        env:
          ORIGAMI2_RENDER_PERFORMANCE_ARTIFACT_DIRECTORY: ${{ runner.temp }}/render-performance-browser
        run: npm run test:render-performance-browser
      - name: Upload render performance browser failure evidence
        if: failure() && steps.render-performance-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: render-performance-browser-failure
          path: ${{ runner.temp }}/render-performance-browser
          if-no-files-found: error
          retention-days: 7
      - name: Measure 10000-edge project save open and undo-redo browser boundary
        id: large-project-io-browser
        working-directory: apps/desktop
        env:
          ORIGAMI2_LARGE_PROJECT_ARTIFACT_DIRECTORY: ${{ runner.temp }}/large-project-io-browser
        run: npm run test:large-project-io-browser
      - name: Upload large project IO browser failure evidence
        if: failure() && steps.large-project-io-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: large-project-io-browser-failure
          path: ${{ runner.temp }}/large-project-io-browser
          if-no-files-found: error
          retention-days: 7
      - name: Verify runtime updater cancel retry and explicit apply in Chromium
        id: runtime-updater-browser
        env:
          ORIGAMI2_RUNTIME_UPDATER_BROWSER_ARTIFACT_DIRECTORY: ${{ runner.temp }}/runtime-updater-browser
        run: npm run test:runtime-updater-browser
      - name: Upload runtime updater browser failure evidence
        if: failure() && steps.runtime-updater-browser.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: runtime-updater-browser-failure
          path: ${{ runner.temp }}/runtime-updater-browser
          if-no-files-found: error
          retention-days: 7
      - name: Load generated GLB in pinned Khronos Sample Viewer
        id: sample-viewer
        shell: bash
        run: |
          set -o pipefail
          viewer_status=0
          npm run test:gltf-sample-viewer 2>&1 \
            | tee "$RUNNER_TEMP/sample-viewer-runtime.log" || viewer_status=$?
          if [ "$viewer_status" -ne 0 ]; then
            annotation="$(
              tail -n 100 "$RUNNER_TEMP/sample-viewer-runtime.log" \
                | tr '\n' ' ' \
                | sed -E 's/[[:space:]]+/ /g' \
                | cut -c1-4000
            )"
            annotation="${annotation//'%'/'%25'}"
            annotation="${annotation//$'\r'/'%0D'}"
            annotation="${annotation//$'\n'/'%0A'}"
            echo "::error title=Sample Viewer runtime log::$annotation"
          fi
          exit "$viewer_status"
      - name: Summarize Sample Viewer failure
        if: failure() && steps.sample-viewer.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "### Sample Viewer runtime failure"
            echo '```text'
            tail -n 200 "$RUNNER_TEMP/sample-viewer-runtime.log"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Sample Viewer runtime log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sample-viewer-runtime-log
          path: ${{ runner.temp }}/sample-viewer-runtime.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Cache pinned Blender LTS
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 (Node.js 24)
        with:
          path: ~/.cache/origami2/blender-4.5.11-linux-x64.tar.xz
          key: blender-linux-x64-4.5.11-05ed7bd41bf3e61ae4f4a7cdc364c43088bf8b3fed702c2269c018fdf63a2188
      - name: Install checksum-verified Blender 4.5.11 LTS
        shell: bash
        run: |
          set -euo pipefail
          archive="$HOME/.cache/origami2/blender-4.5.11-linux-x64.tar.xz"
          blender_root="$RUNNER_TEMP/blender-4.5.11"
          if [ ! -f "$archive" ]; then
            mkdir -p "$(dirname "$archive")"
            curl --fail --location --retry 3 \
              --output "$archive" \
              https://download.blender.org/release/Blender4.5/blender-4.5.11-linux-x64.tar.xz
          fi
          echo "05ed7bd41bf3e61ae4f4a7cdc364c43088bf8b3fed702c2269c018fdf63a2188  $archive" \
            | sha256sum --check --strict
          mkdir -p "$blender_root"
          tar --extract --xz --file "$archive" --strip-components=1 --directory "$blender_root"
      - name: Import generated exports in Blender LTS
        env:
          BLENDER_BIN: ${{ runner.temp }}/blender-4.5.11/blender
        run: npm run test:blender
      - run: npm run build
      - run: npm run lint

  slicer-acceptance:
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.90.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Cache pinned PrusaSlicer
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0 (Node.js 24)
        with:
          path: ~/.cache/origami2/PrusaSlicer-2.9.6.zip
          key: prusaslicer-windows-x64-2.9.6-5aaf22e42f95accecfa122d23a835911f289ecc2ff606db3e83d637ddcc0a209
      - name: Install checksum-verified PrusaSlicer 2.9.6
        shell: pwsh
        run: |
          $archive = Join-Path $HOME '.cache/origami2/PrusaSlicer-2.9.6.zip'
          $destination = Join-Path $env:RUNNER_TEMP 'PrusaSlicer-2.9.6'
          if (-not (Test-Path -LiteralPath $archive)) {
            New-Item -ItemType Directory -Force (Split-Path $archive) | Out-Null
            Invoke-WebRequest `
              -Uri 'https://github.com/prusa3d/PrusaSlicer/releases/download/version_2.9.6/PrusaSlicer-2.9.6.zip' `
              -OutFile $archive
          }
          $actual = (Get-FileHash -LiteralPath $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          $expected = '5aaf22e42f95accecfa122d23a835911f289ecc2ff606db3e83d637ddcc0a209'
          if ($actual -ne $expected) { throw "PrusaSlicer checksum mismatch: $actual" }
          Expand-Archive -LiteralPath $archive -DestinationPath $destination
      - name: Analyze and slice generated positive-thickness STL
        env:
          PRUSASLICER_BIN: ${{ runner.temp }}\PrusaSlicer-2.9.6\PrusaSlicer-2.9.6\prusa-slicer-console.exe
        run: npm run test:prusaslicer

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Link the Windows Rust test harness to the static MSVC runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "RUSTFLAGS=-C target-feature=+crt-static" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - run: cargo fmt --all -- --check
      - name: Rust tests
        id: rust-tests
        shell: bash
        env:
          RUST_BACKTRACE: "1"
          CARGO_TERM_COLOR: always
          RUST_TEST_THREADS: "4"
        run: |
          set -o pipefail
          test_status=0
          if [ "$RUNNER_OS" = "Windows" ]; then
            packages=(
              ori-numeric
              ori-domain
              ori-geometry
              ori-topology
              ori-kinematics
              ori-foldability
              ori-collision
              ori-core
              ori-formats
              ori-instructions
              origami2-desktop
            )
            : > cargo-test.log
            for package in "${packages[@]}"; do
              package_status=0
              printf '::ORIGAMI2_CARGO_PACKAGE_BEGIN::%s\n' "$package" | tee -a cargo-test.log
              cargo test -p "$package" --locked --all-targets --no-fail-fast 2>&1 \
                | tee -a cargo-test.log || package_status=$?
              printf '::ORIGAMI2_CARGO_PACKAGE_END::%s::status=%s\n' "$package" "$package_status" | tee -a cargo-test.log
              if [ "$package_status" -ne 0 ]; then
                printf '%s\n' "$package" > cargo-test-failed-package.txt
                test_status="$package_status"
                break
              fi
            done
          else
            printf '%s\n' workspace > cargo-test-failed-package.txt
            printf '::ORIGAMI2_CARGO_PACKAGE_BEGIN::workspace\n' | tee cargo-test.log
            cargo test --workspace --locked --all-targets --no-fail-fast 2>&1 \
              | tee -a cargo-test.log || test_status=$?
            printf '::ORIGAMI2_CARGO_PACKAGE_END::workspace::status=%s\n' "$test_status" | tee -a cargo-test.log
          fi
          if [ "$test_status" -ne 0 ]; then
            failed_package="$(cat cargo-test-failed-package.txt)"
            failure_summary="$(
              tail -n 30 cargo-test.log \
                | tr '\n' ' ' \
                | sed -E 's/[[:space:]]+/ /g'
            )"
            if [ -z "$failure_summary" ]; then
              failure_summary="Rust tests failed without diagnostic output."
            fi
            failure_summary="package=$failed_package final-30-lines: $failure_summary"
            failure_summary="${failure_summary//'%'/'%25'}"
            failure_summary="${failure_summary//$'\r'/'%0D'}"
            failure_summary="${failure_summary//$'\n'/'%0A'}"
            echo "::error title=Rust tests failed::$failure_summary"
          fi
          exit "$test_status"
      - name: Verify strict dyadic native lifecycle and unsupported-geometry no-op
        shell: bash
        run: |
          cargo test --locked -p origami2-desktop --lib stacked_fold_read::tests::even_cycle_exact_schedules_are_admitted_by_strict_dyadic_read -- --exact --test-threads=1
          cargo test --locked -p origami2-desktop --lib stacked_fold_read::tests::concave_boundary_strict_dyadic_read_fails_closed_without_mutation_authority -- --exact --test-threads=1
          cargo test --locked -p origami2-desktop --lib stacked_fold_read::tests::cut_boundary_strict_dyadic_read_fails_closed_without_mutation_authority -- --exact --test-threads=1
          cargo test --locked -p origami2-desktop --lib stacked_fold_read::tests::hole_boundary_strict_dyadic_read_fails_closed_without_mutation_authority -- --exact --test-threads=1
          cargo test --locked -p origami2-desktop --lib stacked_fold_read::tests::nonfinite_boundary_strict_dyadic_preflight_is_unsupported_no_op -- --exact --test-threads=1
          cargo test --locked -p origami2-desktop --lib stacked_fold_read::tests::degenerate_boundary_strict_dyadic_preflight_is_unsupported_no_op -- --exact --test-threads=1
          cargo test --locked -p origami2-desktop --lib stacked_fold_read::tests::missing_boundary_vertex_strict_dyadic_preflight_is_unsupported_no_op -- --exact --test-threads=1
          cargo test --locked -p origami2-desktop --lib stacked_fold_read::tests::duplicate_boundary_strict_dyadic_preflight_is_unsupported_no_op -- --exact --test-threads=1
          cargo test --locked -p origami2-desktop --lib stacked_fold_read::tests::self_intersecting_boundary_strict_dyadic_preflight_is_unsupported_no_op -- --exact --test-threads=1
          cargo test --locked -p origami2-desktop --lib stacked_fold_read::tests::zero_length_boundary_strict_dyadic_preflight_is_unsupported_no_op -- --exact --test-threads=1
      - name: Verify all real named-technique compilers reach native exports
        shell: bash
        run: |
          printf '%s\n' 'coverage=book_fold,reverse_fold,sink_fold,layer_selective,accordion_fold'
          cargo test --locked -p origami2-desktop --lib \
            instruction_export::tests::compiled_ \
            -- --test-threads=1
      - name: Summarize Rust test failure
        if: failure() && steps.rust-tests.outcome == 'failure'
        shell: bash
        run: |
          sanitized_tail="$RUNNER_TEMP/rust-test-tail-${{ matrix.os }}.log"
          failed_package="$(cat cargo-test-failed-package.txt 2>/dev/null || printf '%s' workspace)"
          tail -n 30 cargo-test.log \
            | sed $'s/\033\\[[0-9;]*[mK]//g' \
            | sed -E 's#(/Users/runner/work|[A-Za-z]:\\\\a\\\\ORIGAMI2)[^[:space:]]*#[workspace]#g' \
            > "$sanitized_tail"
          {
            echo "### Rust test failure (${{ matrix.os }})"
            echo '```text'
            cat "$sanitized_tail"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          annotation="$(
            tr '\n' ' ' < "$sanitized_tail" \
              | sed -E 's/[[:space:]]+/ /g' \
              | cut -c1-4000
          )"
          annotation="${annotation//'%'/'%25'}"
          annotation="${annotation//$'\r'/'%0D'}"
          annotation="${annotation//$'\n'/'%0A'}"
          echo "::error title=Rust test log tail ($failed_package)::package=$failed_package final-30-lines: $annotation"
      - name: Upload Rust test log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-test-log-${{ matrix.os }}
          path: cargo-test.log
          if-no-files-found: ignore
          retention-days: 7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        if: runner.os == 'Windows'
        with:
          python-version: "3.12.10"
      - name: Generate instruction PDF and SVG ZIP with outbound network blocked
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ORIGAMI2_INSTRUCTION_EXPORT_AUDIT_DIRECTORY: ${{ runner.temp }}/instruction-export-audit
        run: ./scripts/run_instruction_export_offline_test.ps1
      - name: Audit generated instruction PDF and SVG ZIP with external parsers
        if: runner.os == 'Windows'
        shell: bash
        env:
          ORIGAMI2_INSTRUCTION_EXPORT_AUDIT_DIRECTORY: ${{ runner.temp }}/instruction-export-audit
        run: |
          python -m pip install --disable-pip-version-check --only-binary=:all: \
            --require-hashes --no-deps -r .github/release-audit-requirements.txt
          python scripts/audit_instruction_exports.py "$ORIGAMI2_INSTRUCTION_EXPORT_AUDIT_DIRECTORY"
      - name: Upload instruction export audit fixtures
        if: failure() && runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: instruction-export-audit-fixtures
          path: ${{ runner.temp }}/instruction-export-audit
          if-no-files-found: ignore
          retention-days: 7
      - name: Rust Clippy
        id: rust-clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --workspace --locked --all-targets --all-features -- -D warnings 2>&1 | tee cargo-clippy.log
      - name: Summarize Rust Clippy failure
        if: failure() && steps.rust-clippy.outcome == 'failure'
        shell: bash
        run: |
          annotation="$(tail -n 80 cargo-clippy.log 2>/dev/null | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g' | cut -c1-4000)"
          annotation="${annotation//'%'/'%25'}"
          annotation="${annotation//$'\r'/'%0D'}"
          annotation="${annotation//$'\n'/'%0A'}"
          echo "::error title=Rust Clippy log tail (${RUNNER_OS})::${annotation:-Clippy failed before log creation}"
      - name: Upload Rust Clippy log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-clippy-log-${{ matrix.os }}
          path: cargo-clippy.log
          if-no-files-found: ignore
          retention-days: 7

  windows-bundle:
    needs: [frontend, rust]
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.90.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install frontend dependencies for bundle checks
        working-directory: apps/desktop
        run: npm ci
      - name: Verify Windows-native recovery close and diagnostics persistence
        shell: pwsh
        run: |
          $env:RUST_TEST_THREADS = '1'
          cargo test --locked -p origami2-desktop --lib recovery::tests -- --test-threads=1
          if ($LASTEXITCODE -ne 0) { throw 'Windows recovery and close contract failed.' }
          cargo test --locked -p origami2-desktop --lib diagnostics::tests -- --test-threads=1
          if ($LASTEXITCODE -ne 0) { throw 'Windows diagnostics persistence contract failed.' }
      - name: Verify Windows-native 10000-edge archive and history budgets
        shell: pwsh
        run: |
          cargo test --locked -p origami2-desktop --lib windows_large_archive_budget_tests -- --test-threads=1
          if ($LASTEXITCODE -ne 0) { throw 'Windows 10000-edge archive budget failed.' }
      - name: Remove stale Windows bundle outputs
        shell: pwsh
        run: |
          $bundleDirectory = Join-Path $env:GITHUB_WORKSPACE 'target\release\bundle\nsis'
          if (Test-Path -LiteralPath $bundleDirectory) {
            $resolved = (Resolve-Path -LiteralPath $bundleDirectory).Path
            $expected = [System.IO.Path]::GetFullPath($bundleDirectory)
            if (-not [string]::Equals($resolved, $expected, [System.StringComparison]::OrdinalIgnoreCase)) {
              throw "Refusing to remove unexpected bundle path '$resolved'."
            }
            Remove-Item -LiteralPath $resolved -Recurse -Force
          }
      - name: Build unsigned Windows NSIS installer
        working-directory: apps/desktop
        run: npm run bundle:windows:ci
      - name: Verify Windows installer resources
        shell: pwsh
        run: |
          try {
            $appVersion = (
              Get-Content ./apps/desktop/src-tauri/tauri.conf.json -Raw |
                ConvertFrom-Json
            ).version
            ./scripts/verify_windows_bundle.ps1 `
              -BundleDirectory ./target/release/bundle/nsis `
              -ExpectedVersion $appVersion `
              -ExpectedSignatureStatus NotSigned `
              -PortableExecutable ./target/release/origami2-desktop.exe
          } catch {
            $message = $_.Exception.Message
            if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_WORKSPACE)) {
              $message = $message.Replace($env:GITHUB_WORKSPACE, '[workspace]')
            }
            $message = $message.Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=Windows installer resource audit failed::$message"
            throw
          }
      - name: Verify Windows production release workflow contract
        shell: pwsh
        run: |
          $installers = @(
            Get-ChildItem -LiteralPath ./target/release/bundle/nsis -File -Filter '*.exe'
          )
          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer for the release contract test."
          }
          ./.github/tests/windows_release_workflow_contract.ps1 `
            -UnsignedExecutableFixture $installers[0].FullName
      - name: Reject adversarial Windows bundle fixtures
        shell: pwsh
        run: |
          $appVersion = (
            Get-Content ./apps/desktop/src-tauri/tauri.conf.json -Raw |
              ConvertFrom-Json
          ).version
          ./.github/tests/windows_bundle_adversarial_contract.ps1 `
            -BundleDirectory ./target/release/bundle/nsis `
            -PortableExecutable ./target/release/origami2-desktop.exe `
            -ExpectedVersion $appVersion
      - name: Upload verified Windows NSIS installer
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ORIGAMI2-windows-nsis-${{ github.run_id }}
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7

  macos-bundle:
    needs: [frontend, rust]
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.90.0
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install frontend dependencies for bundle checks
        working-directory: apps/desktop
        run: npm ci
      - name: Remove stale macOS bundle outputs
        shell: bash
        run: |
          bundle_directory="$GITHUB_WORKSPACE/target/release/bundle/macos"
          case "$bundle_directory" in
            "$GITHUB_WORKSPACE"/target/release/bundle/macos)
              rm -rf -- "$bundle_directory"
              ;;
            *)
              echo "Refusing to remove unexpected bundle path: $bundle_directory" >&2
              exit 1
              ;;
          esac
      - name: Build unsigned macOS app bundle
        working-directory: apps/desktop
        run: npm run bundle:macos:ci
      - name: Verify macOS bundle resources
        shell: bash
        run: ./.github/scripts/verify_macos_bundle.sh
      - name: Reject adversarial macOS bundle fixtures
        shell: bash
        run: |
          app_version="$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          ./.github/tests/macos_bundle_adversarial_contract.sh \
            target/release/bundle/macos/ORIGAMI2.app "$app_version"
      - name: Archive verified macOS app bundle
        shell: bash
        run: tar -C target/release/bundle/macos -czf ORIGAMI2-macos-app.tar.gz ORIGAMI2.app
      - name: Upload verified macOS app bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ORIGAMI2-macos-app-${{ github.run_id }}
          path: ORIGAMI2-macos-app.tar.gz
          if-no-files-found: error
          retention-days: 7

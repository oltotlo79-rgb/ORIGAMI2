name: Cross-platform signed release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]
  workflow_dispatch:
    inputs:
      mode:
        description: "Build only, publish prerelease, publish stable, or promote an existing prerelease"
        required: true
        type: choice
        default: dry-run
        options: [dry-run, prerelease, stable, promote]
      tag:
        description: "Existing signed tag (required except for dry-run)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: formal-release-${{ inputs.tag || github.ref_name || github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      checks: read
      contents: read
    outputs:
      mode: ${{ steps.contract.outputs.mode }}
      tag: ${{ steps.contract.outputs.tag }}
      version: ${{ steps.contract.outputs.version }}
      commit: ${{ steps.contract.outputs.commit }}
      test_count: ${{ steps.release-tests.outputs.count }}
      ci_evidence: ${{ steps.ci-evidence.outputs.json }}
      run_started_at: ${{ steps.release-run-time.outputs.started_at }}
      commit_authored_at: ${{ steps.release-run-time.outputs.commit_authored_at }}
      commit_committed_at: ${{ steps.release-run-time.outputs.commit_committed_at }}
      tag_created_at: ${{ steps.release-run-time.outputs.tag_created_at }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event_name == 'push' && github.ref || inputs.tag || github.sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Import the trusted release-tag verification key
        if: (github.event_name == 'push') || (inputs.mode != 'dry-run')
        env:
          RELEASE_SIGNING_PUBLIC_KEY: ${{ secrets.RELEASE_SIGNING_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_SIGNING_PUBLIC_KEY"
          printf '%s' "$RELEASE_SIGNING_PUBLIC_KEY" | gpg --batch --import
      - id: contract
        env:
          REQUESTED_MODE: ${{ github.event_name == 'push' && 'prerelease' || inputs.mode }}
          REQUESTED_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        run: node .github/scripts/validate_formal_release.mjs
      - id: ci-evidence
        name: Verify successful CI checks for the release commit
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_COMMIT: ${{ steps.contract.outputs.commit }}
          RELEASE_MODE: ${{ steps.contract.outputs.mode }}
          RELEASE_TAG: ${{ steps.contract.outputs.tag }}
        run: |
          set -euo pipefail
          ulimit -c 0
          echo "::add-mask::$GH_TOKEN"
          evidence="$(node .github/scripts/verify_release_ci.mjs)"
          echo "json=$evidence" >> "$GITHUB_OUTPUT"
      - id: release-run-time
        name: Bind release timing to the GitHub workflow run
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_COMMIT: ${{ steps.contract.outputs.commit }}
        run: |
          set -euo pipefail
          ulimit -c 0
          echo "::add-mask::$GH_TOKEN"
          identity="$RUNNER_TEMP/release-run-identity.json"
          timeout 60s gh api "repos/$GH_REPO/actions/runs/$GITHUB_RUN_ID" > "$identity"
          test "$(grep -Eo '"run_started_at"[[:space:]]*:' "$identity" | wc -l)" -eq 1
          test "$(jq -r .id "$identity")" = "$GITHUB_RUN_ID"
          test "$(jq -r .run_attempt "$identity")" = "$GITHUB_RUN_ATTEMPT"
          test "$(jq -r .head_sha "$identity")" = "$RELEASE_COMMIT"
          started_at="$(jq -r .run_started_at "$identity")"
          [[ "$started_at" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]]
          echo "started_at=$started_at" >> "$GITHUB_OUTPUT"
          normalize_time() { node -e 'process.stdout.write(new Date(process.argv[1]).toISOString().replace(".000Z", "Z"))' "$1"; }
          commit_authored_at="$(normalize_time "$(git show -s --format=%aI "$RELEASE_COMMIT")")"
          commit_committed_at="$(normalize_time "$(git show -s --format=%cI "$RELEASE_COMMIT")")"
          tag_created_at=''
          if [ "$RELEASE_MODE" != dry-run ]; then
            test "$(git cat-file -t "refs/tags/$RELEASE_TAG")" = tag
            tag_created_at="$(normalize_time "$(git for-each-ref --format='%(taggerdate:iso-strict)' "refs/tags/$RELEASE_TAG")")"
            test -n "$tag_created_at"
          fi
          echo "commit_authored_at=$commit_authored_at" >> "$GITHUB_OUTPUT"
          echo "commit_committed_at=$commit_committed_at" >> "$GITHUB_OUTPUT"
          echo "tag_created_at=$tag_created_at" >> "$GITHUB_OUTPUT"
          rm -f -- "$identity"
      - id: release-tests
        name: Run and count formal release contract tests
        run: |
          set -euo pipefail
          report="$RUNNER_TEMP/formal-release-tests.tap"
          node --test --test-reporter=tap .github/tests/formal-release.test.mjs | tee "$report"
          count="$(sed -n 's/^# tests //p' "$report" | tail -n 1)"
          test "$count" -gt 0
          test "$count" -le 100000
          echo "count=$count" >> "$GITHUB_OUTPUT"

  build:
    if: needs.validate.outputs.mode != 'promote'
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: macos-14
            platform: macos-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    environment: ${{ needs.validate.outputs.mode != 'dry-run' && 'formal-release-signing' || '' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate.outputs.commit }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.90.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24.11.1
      - working-directory: apps/desktop
        run: npm ci
      - name: Freeze Cargo lock resolution before release build
        shell: bash
        run: cargo metadata --locked --no-deps --format-version 1 > "$RUNNER_TEMP/cargo-metadata.json"
      - name: Verify lockfile content before release build
        run: node .github/scripts/dependency_policy.mjs
      - name: Build Windows portable executable
        if: matrix.platform == 'windows-x64'
        working-directory: apps/desktop
        run: npx --no-install tauri build --ci --no-sign --no-bundle
      - name: Sign Windows portable executable
        if: matrix.platform == 'windows-x64' && needs.validate.outputs.mode != 'dry-run'
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          RELEASE_RUN_STARTED_AT: ${{ needs.validate.outputs.run_started_at }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD)) {
            throw 'Windows signing credentials are required for publication.'
          }
          Write-Output "::add-mask::$env:CERTIFICATE_BASE64"
          Write-Output "::add-mask::$env:CERTIFICATE_PASSWORD"
          $env:COMPlus_DbgEnableMiniDump = '0'
          $env:DOTNET_DbgEnableMiniDump = '0'
          $certificate = Join-Path $env:RUNNER_TEMP 'windows-signing.pfx'
          $storeName = "ORIGAMI2-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT-portable"
          $storePath = "Cert:\CurrentUser\$storeName"
          $importedCertificate = $null
          try {
            if (Test-Path -LiteralPath $storePath) { throw 'Windows isolated signing store collision.' }
            New-Item -Path 'Cert:\CurrentUser' -Name $storeName -ErrorAction Stop | Out-Null
            [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
            $securePassword = ConvertTo-SecureString -String $env:CERTIFICATE_PASSWORD -AsPlainText -Force
            $pfxData = Get-PfxData -FilePath $certificate -Password $securePassword
            $pfxLeaf = @($pfxData.EndEntityCertificates)
            if ($pfxLeaf.Count -ne 1) { throw 'Windows signing PFX must contain exactly one leaf certificate.' }
            $plannedThumbprint = $pfxLeaf[0].Thumbprint
            $importedCertificate = Import-PfxCertificate -FilePath $certificate `
              -CertStoreLocation $storePath -Password $securePassword -Exportable:$false
            if ($importedCertificate.Thumbprint -cne $plannedThumbprint) { throw 'Windows imported certificate identity mismatch.' }
            $file = (Resolve-Path 'target/release/origami2-desktop.exe').Path
            & signtool sign /q /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
              /s $storeName /sha1 $importedCertificate.Thumbprint $file
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $file" }
            $env:WINDOWS_CERTIFICATE_PASSWORD = $env:CERTIFICATE_PASSWORD
            & .\..\..\.github\scripts\verify_windows_signing_identity.ps1 `
              -File $file -Certificate $certificate
          } finally {
            $env:WINDOWS_CERTIFICATE_PASSWORD = $null
            $securePassword = $null
            if (Test-Path -LiteralPath $storePath) { Remove-Item -LiteralPath $storePath -Recurse -Force -ErrorAction Stop }
            if (Test-Path -LiteralPath $certificate) {
              Remove-Item -LiteralPath $certificate -Force -ErrorAction Stop
            }
          }
      - name: Bundle Windows installer around the tested executable
        if: matrix.platform == 'windows-x64'
        working-directory: apps/desktop
        run: npx --no-install tauri bundle --ci --no-sign --bundles nsis
      - name: Sign Windows installer
        if: matrix.platform == 'windows-x64' && needs.validate.outputs.mode != 'dry-run'
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          RELEASE_RUN_STARTED_AT: ${{ needs.validate.outputs.run_started_at }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD)) {
            throw 'Windows signing credentials are required for publication.'
          }
          Write-Output "::add-mask::$env:CERTIFICATE_BASE64"
          Write-Output "::add-mask::$env:CERTIFICATE_PASSWORD"
          $env:COMPlus_DbgEnableMiniDump = '0'
          $env:DOTNET_DbgEnableMiniDump = '0'
          $certificate = Join-Path $env:RUNNER_TEMP 'windows-signing.pfx'
          $storeName = "ORIGAMI2-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT-installer"
          $storePath = "Cert:\CurrentUser\$storeName"
          $importedCertificate = $null
          try {
            if (Test-Path -LiteralPath $storePath) { throw 'Windows isolated signing store collision.' }
            New-Item -Path 'Cert:\CurrentUser' -Name $storeName -ErrorAction Stop | Out-Null
            [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
            $securePassword = ConvertTo-SecureString -String $env:CERTIFICATE_PASSWORD -AsPlainText -Force
            $pfxData = Get-PfxData -FilePath $certificate -Password $securePassword
            $pfxLeaf = @($pfxData.EndEntityCertificates)
            if ($pfxLeaf.Count -ne 1) { throw 'Windows signing PFX must contain exactly one leaf certificate.' }
            $plannedThumbprint = $pfxLeaf[0].Thumbprint
            $importedCertificate = Import-PfxCertificate -FilePath $certificate `
              -CertStoreLocation $storePath -Password $securePassword -Exportable:$false
            if ($importedCertificate.Thumbprint -cne $plannedThumbprint) { throw 'Windows imported certificate identity mismatch.' }
            $file = (Get-ChildItem 'target/release/bundle/nsis' -Filter '*.exe' -File -Recurse -ErrorAction Stop).FullName
            & signtool sign /q /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
              /s $storeName /sha1 $importedCertificate.Thumbprint $file
            if ($LASTEXITCODE -ne 0) { throw "signtool failed for $file" }
            $env:WINDOWS_CERTIFICATE_PASSWORD = $env:CERTIFICATE_PASSWORD
            & .\..\..\.github\scripts\verify_windows_signing_identity.ps1 `
              -File $file -Certificate $certificate
          } finally {
            $env:WINDOWS_CERTIFICATE_PASSWORD = $null
            $securePassword = $null
            if (Test-Path -LiteralPath $storePath) { Remove-Item -LiteralPath $storePath -Recurse -Force -ErrorAction Stop }
            if (Test-Path -LiteralPath $certificate) {
              Remove-Item -LiteralPath $certificate -Force -ErrorAction Stop
            }
          }
      - name: Cleanup Windows signing material after every outcome
        if: always() && matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $certificate = Join-Path $env:RUNNER_TEMP 'windows-signing.pfx'
          $verificationLog = Join-Path $env:RUNNER_TEMP 'windows-signature-verification.log'
          foreach ($suffix in @('portable', 'installer')) {
            $storeName = "ORIGAMI2-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT-$suffix"
            $storePath = "Cert:\CurrentUser\$storeName"
            if (Test-Path -LiteralPath $storePath) { Remove-Item -LiteralPath $storePath -Recurse -Force -ErrorAction Stop }
          }
          foreach ($path in @($certificate, $verificationLog)) {
            if (Test-Path -LiteralPath $path) { Remove-Item -LiteralPath $path -Force -ErrorAction Stop }
          }
      - name: Verify Windows installer and portable executable contract
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          SIGNATURE_STATUS: ${{ needs.validate.outputs.mode != 'dry-run' && 'Valid' || 'NotSigned' }}
        run: >
          ./scripts/verify_windows_bundle.ps1
          -BundleDirectory ./target/release/bundle/nsis
          -ExpectedVersion $env:RELEASE_VERSION
          -ExpectedSignatureStatus $env:SIGNATURE_STATUS
          -PortableExecutable ./target/release/origami2-desktop.exe
      - name: Build macOS application
        if: matrix.platform == 'macos-arm64'
        working-directory: apps/desktop
        run: npm run bundle:macos:ci
      - name: Sign macOS application
        if: matrix.platform == 'macos-arm64' && needs.validate.outputs.mode != 'dry-run'
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          RELEASE_RUN_STARTED_AT: ${{ needs.validate.outputs.run_started_at }}
        run: |
          set -euo pipefail
          ulimit -c 0
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$SIGNING_IDENTITY"
          echo "::add-mask::$CERTIFICATE_BASE64"
          echo "::add-mask::$CERTIFICATE_PASSWORD"
          echo "::add-mask::$SIGNING_IDENTITY"
          keychain="$RUNNER_TEMP/origami2-signing.keychain-db"
          keychain_search_state="$RUNNER_TEMP/origami2-keychain-search-list.bin"
          certificate="$RUNNER_TEMP/apple-signing.p12"
          signing_pem="$RUNNER_TEMP/apple-signing.pem"
          test ! -e "$keychain"
          test ! -e "$keychain_search_state"
          test ! -e "$certificate"
          test ! -e "$signing_pem"
          cleanup_signing_material() {
            status="$1"
            trap - EXIT HUP INT TERM
            cleanup_status=0
            if [ -e "$keychain_search_state" ]; then
              original_keychains=()
              while IFS= read -r -d '' item; do original_keychains+=("$item"); done < "$keychain_search_state"
              security list-keychains -d user -s "${original_keychains[@]}" >/dev/null 2>&1 || cleanup_status=$?
            fi
            security delete-keychain "$keychain" >/dev/null 2>&1 || cleanup_status=$?
            rm -f -- "$certificate" "$signing_pem" "$keychain_search_state" || cleanup_status=$?
            [ "$status" -ne 0 ] && exit "$status"
            exit "$cleanup_status"
          }
          trap 'cleanup_signing_material $?' EXIT
          trap 'cleanup_signing_material 129' HUP
          trap 'cleanup_signing_material 130' INT
          trap 'cleanup_signing_material 143' TERM
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$certificate"
          chmod 600 "$certificate"
          openssl pkcs12 -in "$certificate" -passin env:CERTIFICATE_PASSWORD -nodes -out "$signing_pem"
          chmod 600 "$signing_pem"
          original_keychains=()
          while IFS= read -r item; do
            [ -n "$item" ] && original_keychains+=("$item")
          done < <(security list-keychains -d user | sed -E 's/^[[:space:]]*"//; s/"[[:space:]]*$//')
          [ "${#original_keychains[@]}" -gt 0 ]
          printf '%s\0' "${original_keychains[@]}" > "$keychain_search_state"
          chmod 600 "$keychain_search_state"
          security create-keychain -p temporary "$keychain"
          security unlock-keychain -p temporary "$keychain"
          security import "$signing_pem" -k "$keychain" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k temporary "$keychain"
          security list-keychains -d user -s "$keychain" "${original_keychains[@]}"
          codesign --force --deep --options runtime --timestamp --sign "$SIGNING_IDENTITY" \
            target/release/bundle/macos/ORIGAMI2.app
          APPLE_SIGNING_IDENTITY="$SIGNING_IDENTITY" \
            bash ../../.github/scripts/verify_macos_signing_identity.sh \
              target/release/bundle/macos/ORIGAMI2.app
      - name: Notarize and staple macOS application
        id: notarization
        if: matrix.platform == 'macos-arm64' && needs.validate.outputs.mode != 'dry-run'
        env:
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          ulimit -c 0
          test -n "$APPLE_NOTARY_KEY_BASE64"
          test -n "$APPLE_NOTARY_KEY_ID"
          test -n "$APPLE_NOTARY_ISSUER_ID"
          echo "::add-mask::$APPLE_NOTARY_KEY_BASE64"
          echo "::add-mask::$APPLE_NOTARY_KEY_ID"
          echo "::add-mask::$APPLE_NOTARY_ISSUER_ID"
          key="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          archive="$RUNNER_TEMP/ORIGAMI2-notarization.zip"
          result="$RUNNER_TEMP/ORIGAMI2-notarization-result.json"
          cleanup_notary_material() {
            status="$1"
            trap - EXIT HUP INT TERM
            cleanup_status=0
            rm -f -- "$key" "$archive" "$result" || cleanup_status=$?
            [ "$status" -ne 0 ] && exit "$status"
            exit "$cleanup_status"
          }
          trap 'cleanup_notary_material $?' EXIT
          trap 'cleanup_notary_material 129' HUP
          trap 'cleanup_notary_material 130' INT
          trap 'cleanup_notary_material 143' TERM
          echo "$APPLE_NOTARY_KEY_BASE64" | base64 --decode > "$key"
          chmod 600 "$key"
          ditto -c -k --keepParent target/release/bundle/macos/ORIGAMI2.app "$archive"
          xcrun notarytool submit "$archive" --key "$key" \
            --key-id "$APPLE_NOTARY_KEY_ID" --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait --output-format json > "$result"
          test "$(jq -r .status "$result")" = Accepted
          [[ "$(jq -r .id "$result")" =~ ^[0-9a-fA-F-]{36}$ ]]
          xcrun stapler staple target/release/bundle/macos/ORIGAMI2.app
          xcrun stapler validate target/release/bundle/macos/ORIGAMI2.app
          spctl --assess --type execute target/release/bundle/macos/ORIGAMI2.app
      - name: Cleanup Apple signing and notarization material after every outcome
        if: always() && matrix.platform == 'macos-arm64' && needs.validate.outputs.mode != 'dry-run'
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/origami2-signing.keychain-db"
          keychain_search_state="$RUNNER_TEMP/origami2-keychain-search-list.bin"
          certificate="$RUNNER_TEMP/apple-signing.p12"
          signing_pem="$RUNNER_TEMP/apple-signing.pem"
          archive="$RUNNER_TEMP/ORIGAMI2-notarization.zip"
          result="$RUNNER_TEMP/ORIGAMI2-notarization-result.json"
          if [ -e "$keychain_search_state" ]; then
            original_keychains=()
            while IFS= read -r -d '' item; do original_keychains+=("$item"); done < "$keychain_search_state"
            security list-keychains -d user -s "${original_keychains[@]}" >/dev/null 2>&1
          fi
          if [ -e "$keychain" ]; then security delete-keychain "$keychain" >/dev/null 2>&1; fi
          rm -f -- "$certificate" "$signing_pem" "$keychain_search_state" "$archive" "$result" "$RUNNER_TEMP"/AuthKey_*.p8
          test ! -e "$keychain"
          test ! -e "$certificate"
          test ! -e "$signing_pem"
          test ! -e "$keychain_search_state"
          test ! -e "$archive"
          test ! -e "$result"
          ! compgen -G "$RUNNER_TEMP/AuthKey_*.p8" >/dev/null
      - name: Verify macOS application bundle contract
        if: matrix.platform == 'macos-arm64'
        shell: bash
        run: ./.github/scripts/verify_macos_bundle.sh target/release/bundle/macos/ORIGAMI2.app "${{ needs.validate.outputs.version }}"
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: target/formal-release/ORIGAMI2-v${{ needs.validate.outputs.version }}-${{ matrix.platform }}.cdx.json
          upload-artifact: false
      - name: Bind SBOM to source locks, version, commit, and toolchains
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          BUILD_MODE: ${{ needs.validate.outputs.mode != 'dry-run' && 'signed-release' || 'unsigned-dry-run' }}
          TARGET_TRIPLE: ${{ matrix.platform == 'windows-x64' && 'x86_64-pc-windows-msvc' || 'aarch64-apple-darwin' }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_RUN_STARTED_AT: ${{ needs.validate.outputs.run_started_at }}
          EXECUTED_TEST_COUNT: ${{ needs.validate.outputs.test_count }}
          SOURCE_COMMIT_AUTHORED_AT: ${{ needs.validate.outputs.commit_authored_at }}
          SOURCE_COMMIT_COMMITTED_AT: ${{ needs.validate.outputs.commit_committed_at }}
          RELEASE_TAG_CREATED_AT: ${{ needs.validate.outputs.tag_created_at }}
          CI_CHECK_EVIDENCE_JSON: ${{ needs.validate.outputs.ci_evidence }}
        run: |
          RUSTC_VERSION="$(rustc --version)" \
          NODE_VERSION="$(node --version)" \
            node .github/scripts/bind_release_sbom.mjs \
              "target/formal-release/ORIGAMI2-v${VERSION}-${PLATFORM}.cdx.json"
      - name: Package platform artifacts
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ needs.validate.outputs.version }}
          SIGNATURE_POLICY: ${{ needs.validate.outputs.mode != 'dry-run' && 'platform-signed' || 'unsigned-dry-run' }}
        run: ./.github/scripts/package_formal_release.ps1
      - name: Verify local release artifact contract
        env:
          RELEASE_PLATFORM: ${{ matrix.platform }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          RELEASE_MODE: ${{ needs.validate.outputs.mode }}
          REQUIRE_SIGNATURE: ${{ needs.validate.outputs.mode != 'dry-run' && 'true' || 'false' }}
          EXPECTED_SIGNATURE_POLICY: ${{ needs.validate.outputs.mode != 'dry-run' && 'platform-signed' || 'unsigned-dry-run' }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          EXECUTED_TEST_COUNT: ${{ needs.validate.outputs.test_count }}
        run: node .github/scripts/verify_formal_release.mjs target/formal-release
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: formal-release-${{ matrix.platform }}
          path: target/formal-release
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  publish:
    if: needs.validate.outputs.mode == 'prerelease' || needs.validate.outputs.mode == 'stable'
    needs: [validate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: formal-release
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate.outputs.commit }}
          persist-credentials: false
      - name: Verify immutable workflow artifact archive digests
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
        run: |
          set -euo pipefail
          ulimit -c 0
          echo "::add-mask::$GH_TOKEN"
          metadata="$RUNNER_TEMP/formal-release-artifacts.json"
          metadata_headers="$RUNNER_TEMP/formal-release-artifacts.headers"
          curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
            --max-redirs 0 --max-filesize 1048576 \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            --dump-header "$metadata_headers" \
            --output "$metadata" \
            "https://api.github.com/repos/$GH_REPO/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100"
          grep -Eiq '^content-type: application/(json|vnd\.github\+json)(;|\r?$)' "$metadata_headers"
          ! grep -Eiq '^link:' "$metadata_headers"
          while IFS=$'\t' read -r name artifact_id expected_digest
          do
            archive="$RUNNER_TEMP/$name.zip"
            archive_headers="$RUNNER_TEMP/$name.headers"
            final_url="$(curl --fail --silent --show-error --location --proto '=https' \
              --proto-redir '=https' --tlsv1.2 --max-redirs 1 \
              --max-filesize 2147483648 \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              --dump-header "$archive_headers" \
              --output "$archive" \
              --write-out '%{url_effective}' \
              "https://api.github.com/repos/$GH_REPO/actions/artifacts/$artifact_id/zip")"
            [[ "$final_url" =~ ^https://[A-Za-z0-9.-]+\.blob\.core\.windows\.net/[^[:space:]]+$ ]]
            unset final_url
            sed -E -i 's/^(location:).*/\1 [REDACTED]/I' "$archive_headers"
            grep -Eiq '^content-type: (application/zip|application/octet-stream)(;|\r?$)' "$archive_headers"
            content_length="$(awk 'BEGIN { IGNORECASE=1 } /^content-length:/ { gsub("\r", "", $2); value=$2 } END { print value }' "$archive_headers")"
            test "$content_length" -eq "$(stat -c '%s' "$archive")"
            actual_digest="$(sha256sum "$archive" | cut -d' ' -f1)"
            test "$actual_digest" = "$expected_digest"
            printf '%s  %s\n' "$actual_digest" "$archive" > "$archive.sha256"
          done < <(node .github/scripts/verify_workflow_artifact_metadata.mjs "$metadata")
      - name: Extract only the digest-verified artifact archives
        run: |
          set -euo pipefail
          mkdir release
          for archive in "$RUNNER_TEMP"/formal-release-*.zip
          do
            sha256sum --check --strict "$archive.sha256"
            archive_bytes="$(stat -c '%s' "$archive")"
            test "$archive_bytes" -gt 0
            test "$archive_bytes" -le 2147483648
            unzip -tqq "$archive"
            entries="$RUNNER_TEMP/$(basename "$archive").entries"
            unzip -Z1 "$archive" > "$entries"
            test "$(wc -l < "$entries")" -eq "$(LC_ALL=C sort -u "$entries" | wc -l)"
            test "$(wc -l < "$entries")" -eq "$(awk '{ print tolower($0) }' "$entries" | LC_ALL=C sort -u | wc -l)"
            entry_count=0
            while IFS= read -r entry
            do
              entry_count=$((entry_count + 1))
              test "$entry_count" -le 16
              test -n "$entry"
              case "$entry" in
                */*|*\\*|.*|*[!A-Za-z0-9._-]*) exit 1 ;;
              esac
            done < "$entries"
            test "$entry_count" -ge 4
            expanded_bytes="$(unzip -l "$archive" | awk 'END { print $1 }')"
            test "$expanded_bytes" -le 3221225472
            ratio_bound=$((archive_bytes * 200 + 1048576))
            test "$expanded_bytes" -le "$ratio_bound"
            unzip -q "$archive" -d release
          done
          test -z "$(find release -mindepth 1 -maxdepth 1 ! -type f -print -quit)"
          test -z "$(find release -type f -links +1 -print -quit)"
          test "$(find release -maxdepth 1 -type f | wc -l)" -eq 9
          release_root="$(realpath -e release)"
          while IFS= read -r file
          do
            resolved="$(realpath -e "$file")"
            test "$(dirname "$resolved")" = "$release_root"
            test "$(basename "$resolved")" = "$(basename "$file")"
          done < <(find release -mindepth 1 -maxdepth 1 -type f -print)
          test "$(find release -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | wc -l)" -eq \
            "$(find release -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | awk '{ print tolower($0) }' | LC_ALL=C sort -u | wc -l)"
      - name: Verify the complete merged release set before publication
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          EXPECTED_SIGNATURE_POLICY: platform-signed
        run: |
          set -euo pipefail
          node .github/scripts/verify_merged_release_set.mjs release
          LC_ALL=C find release -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort |
            while IFS= read -r name; do sha256sum "release/$name"; done > "$RUNNER_TEMP/verified-release.sha256"
          test "$(wc -l < "$RUNNER_TEMP/verified-release.sha256")" -eq 9
          node .github/scripts/verify_merged_release_set.mjs release
          sha256sum --check --strict "$RUNNER_TEMP/verified-release.sha256"
      - name: Remove temporary artifact transport files
        if: always()
        run: |
          set -euo pipefail
          case "$RUNNER_TEMP" in
            /*) ;;
            *) exit 1 ;;
          esac
          rm -f -- \
            "$RUNNER_TEMP/formal-release-artifacts.json" \
            "$RUNNER_TEMP/formal-release-artifacts.headers" \
            "$RUNNER_TEMP"/formal-release-*.zip \
            "$RUNNER_TEMP"/formal-release-*.zip.sha256 \
            "$RUNNER_TEMP"/formal-release-*.zip.entries \
            "$RUNNER_TEMP"/formal-release-*.headers
          test ! -e "$RUNNER_TEMP/formal-release-artifacts.json"
          test ! -e "$RUNNER_TEMP/formal-release-artifacts.headers"
          ! compgen -G "$RUNNER_TEMP/formal-release-*.zip" >/dev/null
          ! compgen -G "$RUNNER_TEMP/formal-release-*.headers" >/dev/null
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: |
            release/*.exe
            release/*.zip
            release/*.tar.gz
            release/*.cdx.json
            release/*.update.json
            release/SHA256SUMS-*.txt
      - name: Verify newly generated provenance for the complete release set
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: bash .github/scripts/verify_release_provenance.sh release "$RELEASE_VERSION" "$GH_REPO"
      - name: Seal the verified release staging directory read-only
        run: |
          set -euo pipefail
          test "$(find release -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 9
          sha256sum --check --strict "$RUNNER_TEMP/verified-release.sha256"
          find release -mindepth 1 -maxdepth 1 -type f -exec chmod 0444 {} +
          chmod 0555 release
          cp -- "$RUNNER_TEMP/verified-release.sha256" "$RUNNER_TEMP/release-staging.sha256"
          sha256sum --check --strict "$RUNNER_TEMP/release-staging.sha256"
      - name: Publish immutable tagged release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_MODE: ${{ needs.validate.outputs.mode }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          ulimit -c 0
          echo "::add-mask::$GH_TOKEN"
          [[ "$GH_REPO" =~ ^[A-Za-z0-9_.-]{1,100}/[A-Za-z0-9_.-]{1,100}$ ]]
          [[ "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          created_release_id=''
          draft_created=false
          release_published=false
          transaction_name="ORIGAMI2 draft transaction $GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          ownership_token="$(node -e "process.stdout.write(require('node:crypto').randomBytes(32).toString('hex'))")"
          [[ "$ownership_token" =~ ^[0-9a-f]{64}$ ]]
          echo "::add-mask::$ownership_token"
          ownership_commitment="$(printf '%s' "$ownership_token" | sha256sum | cut -d ' ' -f 1)"
          [[ "$ownership_commitment" =~ ^[0-9a-f]{64}$ ]]
          echo "::add-mask::$ownership_commitment"
          unset ownership_token
          ownership_marker="<!-- origami2-release-owner-sha256:$ownership_commitment -->"
          verify_owned_draft() {
            owned_id="$1"
            owned_state="$2"
            test "$owned_id" -gt 0
            timeout 60s gh api "repos/$GH_REPO/releases/$owned_id" > "$owned_state"
            jq -e --argjson id "$owned_id" --arg name "$transaction_name" \
              --arg tag "$RELEASE_TAG" --arg commit "$RELEASE_COMMIT" \
              --arg marker "$ownership_marker" \
              '.id == $id and .name == $name and .tag_name == $tag
                and .target_commitish == $commit and .draft == true
                and (.body | strings | endswith("\n\n" + $marker + "\n"))' "$owned_state" >/dev/null
            test "$(timeout 60s gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" --jq .id)" = "$owned_id"
            node .github/scripts/verify_remote_release_assets.mjs release "$owned_state" --allow-subset
          }
          cleanup_partial_draft() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ] && [ "$release_published" = true ]; then
              quarantine_state="$RUNNER_TEMP/quarantine-release.json"
              quarantine_body="$RUNNER_TEMP/quarantine-release-notes.md"
              quarantine_evidence="$RUNNER_TEMP/quarantine-evidence.json"
              quarantine_verified=false
              if timeout 60s gh api "repos/$GH_REPO/releases/$created_release_id" > "$quarantine_state" \
                && test "$(jq -r .id "$quarantine_state")" = "$created_release_id" \
                && test "$(jq -r .tag_name "$quarantine_state")" = "$RELEASE_TAG" \
                && test "$(jq -r .target_commitish "$quarantine_state")" = "$RELEASE_COMMIT" \
                && test "$(jq -r .draft "$quarantine_state")" = false \
                && test "$(jq -cer '[.assets[] | {id, name, size, digest, updated_at}] | sort_by(.name)' "$quarantine_state")" = "$asset_identity"
              then
                {
                  printf '## QUARANTINED RELEASE\n\n'
                  printf 'Automated post-publication verification failed. Do not install these assets.\n\n'
                  cat -- "$public_notes_file"
                } > "$quarantine_body"
                if timeout 60s gh api --method PATCH "repos/$GH_REPO/releases/$created_release_id" \
                  -f name="QUARANTINED $RELEASE_TAG" -F draft=false -F prerelease=true \
                  -F body=@"$quarantine_body" > "$quarantine_state" \
                  && test "$(jq -r .id "$quarantine_state")" = "$created_release_id" \
                  && test "$(jq -r .name "$quarantine_state")" = "QUARANTINED $RELEASE_TAG" \
                  && test "$(jq -r .tag_name "$quarantine_state")" = "$RELEASE_TAG" \
                  && test "$(jq -r .target_commitish "$quarantine_state")" = "$RELEASE_COMMIT" \
                  && test "$(jq -r .draft "$quarantine_state")" = false \
                  && test "$(jq -r .prerelease "$quarantine_state")" = true \
                  && test "$(jq -cer '[.assets[] | {id, name, size, digest, updated_at}] | sort_by(.name)' "$quarantine_state")" = "$asset_identity" \
                  && jq -e --rawfile body "$quarantine_body" '.body == $body' "$quarantine_state" >/dev/null
                then
                  quarantine_verified=true
                fi
              fi
              jq -cn --arg tag "$RELEASE_TAG" --arg commit "$RELEASE_COMMIT" \
                --arg release_id "$created_release_id" --argjson quarantined "$quarantine_verified" \
                --arg run_id "$GITHUB_RUN_ID" --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
                '{schemaVersion:1,event:"post-publication-verification-failure",tag:$tag,
                  commit:$commit,releaseId:$release_id,runId:$run_id,runAttempt:$run_attempt,
                  quarantineVerified:$quarantined}' > "$quarantine_evidence"
              printf '\n## Release quarantine\n\n- Evidence SHA-256: %s\n- Quarantine verified: %s\n' \
                "$(sha256sum "$quarantine_evidence" | cut -d ' ' -f 1)" "$quarantine_verified" >> "$GITHUB_STEP_SUMMARY"
              cat -- "$quarantine_evidence" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Published release verification failed; quarantine verified=$quarantine_verified"
              test "$quarantine_verified" = true
            elif [ "$status" -ne 0 ] && [ "$draft_created" = true ]; then
              state="$RUNNER_TEMP/partial-release.json"
              if [ -z "$created_release_id" ]; then
                candidate="$RUNNER_TEMP/partial-release-candidate.json"
                if timeout 60s gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" > "$candidate" \
                  && jq -e --arg name "$transaction_name" --arg marker "$ownership_marker" \
                    '.id | numbers | . > 0' "$candidate" >/dev/null \
                  && jq -e --arg name "$transaction_name" --arg marker "$ownership_marker" \
                    '.name == $name and (.body | strings | endswith("\n\n" + $marker + "\n"))' "$candidate" >/dev/null
                then
                  created_release_id="$(jq -r .id "$candidate")"
                fi
              fi
              if test -n "$created_release_id" \
                && verify_owned_draft "$created_release_id" "$state"
              then
                rollback_complete=false
                for rollback_attempt in 1 2 3; do
                  if verify_owned_draft "$created_release_id" "$state" \
                    && timeout 60s gh api --method DELETE "repos/$GH_REPO/releases/$created_release_id" \
                    && ! timeout 60s gh api "repos/$GH_REPO/releases/$created_release_id" >/dev/null 2>&1
                  then
                    rollback_complete=true
                    break
                  fi
                  [ "$rollback_attempt" -eq 3 ] || sleep 2
                done
                test "$rollback_complete" = true
              fi
            fi
            exit "$status"
          }
          trap cleanup_partial_draft EXIT
          test "$(stat -c '%a' release)" = 555
          test -z "$(find release -mindepth 1 -maxdepth 1 -type f -printf '%m\n' | grep -vx 444 || true)"
          sha256sum --check --strict "$RUNNER_TEMP/release-staging.sha256"
          ! timeout 60s gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1
          remote_commit="$(timeout 60s gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha)"
          test "$remote_commit" = "$RELEASE_COMMIT"
          notes_json="$RUNNER_TEMP/release-notes.json"
          notes_file="$RUNNER_TEMP/release-notes.md"
          public_notes_file="$RUNNER_TEMP/public-release-notes.md"
          timeout 60s gh api --method POST "repos/$GH_REPO/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" -f target_commitish="$RELEASE_COMMIT" \
            > "$notes_json"
          test "$(stat -c '%s' "$notes_json")" -le 1048576
          test "$(jq -r .name "$notes_json")" = "$RELEASE_TAG"
          jq -er '.body | strings | select(length > 0 and length <= 100000)' "$notes_json" > "$notes_file"
          test -s "$notes_file"
          cp -- "$notes_file" "$public_notes_file"
          printf '\n\n%s\n' "$ownership_marker" >> "$notes_file"
          test "$(stat -c '%s' "$notes_file")" -le 100128
          created="$RUNNER_TEMP/created-draft-release.json"
          draft_created=true
          timeout 60s gh api --method POST "repos/$GH_REPO/releases" \
            -f tag_name="$RELEASE_TAG" -f target_commitish="$RELEASE_COMMIT" \
            -f name="$transaction_name" -F body=@"$notes_file" \
            -F draft=true -F prerelease=false > "$created"
          created_release_id="$(jq -er '.id | numbers | select(. > 0)' "$created" || true)"
          test -n "$created_release_id"
          verify_owned_draft "$created_release_id" "$created"
          test "$(jq '.assets | length' "$created")" -eq 0
          for asset in release/*
          do
            sha256sum --check --strict "$RUNNER_TEMP/release-staging.sha256"
            verify_owned_draft "$created_release_id" "$RUNNER_TEMP/pre-upload-draft.json"
            exec {asset_fd}<"$asset"
            timeout 600s gh api --method POST --hostname uploads.github.com \
              "repos/$GH_REPO/releases/$created_release_id/assets?name=$(basename "$asset")" \
              --header 'Content-Type: application/octet-stream' \
              --input "/proc/$$/fd/$asset_fd" >/dev/null
            exec {asset_fd}<&-
            sha256sum --check --strict "$RUNNER_TEMP/release-staging.sha256"
          done
          remote_release="$RUNNER_TEMP/remote-draft-release.json"
          verify_owned_draft "$created_release_id" "$remote_release"
          node .github/scripts/verify_remote_release_assets.mjs release "$remote_release"
          sha256sum --check --strict "$RUNNER_TEMP/release-staging.sha256"
          test "$(jq -r .draft "$remote_release")" = true
          test "$(jq -r .tag_name "$remote_release")" = "$RELEASE_TAG"
          test "$(jq -r .target_commitish "$remote_release")" = "$RELEASE_COMMIT"
          test "$(timeout 60s gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" --jq .id)" = "$created_release_id"
          test "$(timeout 60s gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha)" = "$RELEASE_COMMIT"
          asset_identity="$(jq -cer '
            [.assets[] | {id, name, size, digest, updated_at}]
            | select(length == 9 and all(.[]; (.id | numbers) > 0))
            | sort_by(.name)
            | select(([.[].id] | unique | length) == 9)
          ' "$remote_release")"
          publish_prerelease=false
          [ "$RELEASE_MODE" = stable ] || publish_prerelease=true
          timeout 60s gh api --method PATCH "repos/$GH_REPO/releases/$created_release_id" \
            -f name="ORIGAMI2 $RELEASE_TAG" -F draft=false \
            -F prerelease="$publish_prerelease" -F body=@"$public_notes_file" >/dev/null
          release_published=true
          published="$RUNNER_TEMP/published-release.json"
          published_headers="$RUNNER_TEMP/published-release.headers"
          test "$published" != "$published_headers"
          verify_release_api_headers() {
            response_headers="$1"
            response_status="$2"
            node .github/scripts/verify_release_response_headers.mjs "$response_headers" "$response_status"
          }
          publish_verified=false
          consecutive_verified=0
          for attempt in 1 2 3; do
            if published_status="$(curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
              --connect-timeout 15 --max-time 60 \
              --max-redirs 0 --max-filesize 1048576 \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              --header 'Cache-Control: no-cache' --header 'Pragma: no-cache' \
              --dump-header "$published_headers" --output "$published" \
              --write-out '%{http_code}' \
              "https://api.github.com/repos/$GH_REPO/releases/$created_release_id")" \
              && verify_release_api_headers "$published_headers" "$published_status" \
              && test "$(jq -r .id "$published")" = "$created_release_id" \
              && test "$(jq -r .name "$published")" = "ORIGAMI2 $RELEASE_TAG" \
              && test "$(jq -r .tag_name "$published")" = "$RELEASE_TAG" \
              && test "$(jq -r .target_commitish "$published")" = "$RELEASE_COMMIT" \
              && test "$(jq -r .draft "$published")" = false \
              && test "$(jq -r .prerelease "$published")" = "$publish_prerelease" \
              && jq -e --rawfile body "$public_notes_file" '.body == $body' "$published" >/dev/null \
              && node .github/scripts/verify_remote_release_assets.mjs release "$published"
            then
              current_identity="$(jq -cer '[.assets[] | {id, name, size, digest, updated_at}] | sort_by(.name)' "$published")"
              test "$current_identity" = "$asset_identity"
              consecutive_verified=$((consecutive_verified + 1))
              if [ "$consecutive_verified" -eq 2 ]; then
                publish_verified=true
                break
              fi
            else
              consecutive_verified=0
            fi
            [ "$attempt" -eq 3 ] || sleep 5
          done
          test "$publish_verified" = true
          tagged_published="$RUNNER_TEMP/tagged-published-release.json"
          tagged_headers="$RUNNER_TEMP/tagged-published-release.headers"
          test "$tagged_published" != "$tagged_headers"
          tagged_status="$(curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
            --connect-timeout 15 --max-time 60 \
            --max-redirs 0 --max-filesize 1048576 \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            --header 'Cache-Control: no-cache' --header 'Pragma: no-cache' \
            --dump-header "$tagged_headers" --output "$tagged_published" \
            --write-out '%{http_code}' \
            "https://api.github.com/repos/$GH_REPO/releases/tags/$RELEASE_TAG")"
          verify_release_api_headers "$tagged_headers" "$tagged_status"
          test "$(jq -r .id "$tagged_published")" = "$created_release_id"
          tagged_identity="$(jq -cer '[.assets[] | {id, name, size, digest, updated_at}] | sort_by(.name)' "$tagged_published")"
          test "$tagged_identity" = "$asset_identity"
          node .github/scripts/verify_remote_release_assets.mjs release "$tagged_published"
          test "$(timeout 60s gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha)" = "$RELEASE_COMMIT"
          created_release_id=''
          draft_created=false
          release_published=false

  promote:
    if: needs.validate.outputs.mode == 'promote'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: formal-release
    permissions:
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate.outputs.commit }}
          persist-credentials: false
      - name: Download the existing prerelease assets without rebuilding
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          ulimit -c 0
          echo "::add-mask::$GH_TOKEN"
          gh release download "$RELEASE_TAG" --repo "$GH_REPO" --dir release
      - name: Verify the complete immutable asset set
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          EXPECTED_SIGNATURE_POLICY: platform-signed
        run: node .github/scripts/verify_merged_release_set.mjs release
      - name: Verify build provenance for every published payload
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: bash .github/scripts/verify_release_provenance.sh release "$RELEASE_VERSION" "$GH_REPO"
      - name: Promote the existing prerelease without replacing assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
        run: |
          set -euo pipefail
          echo "::add-mask::$GH_TOKEN"
          before="$RUNNER_TEMP/release-assets-before.json"
          after="$RUNNER_TEMP/release-assets-after.json"
          gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" \
            --jq '{id,tag_name,target_commitish,draft,prerelease,assets:[.assets[]|{id,name,size,digest,updated_at}]|sort_by(.name)}' \
            > "$before"
          release_id="$(jq -r .id "$before")"
          test "$release_id" -gt 0
          test "$(jq -r .tag_name "$before")" = "$RELEASE_TAG"
          test "$(jq -r .target_commitish "$before")" = "$RELEASE_COMMIT"
          test "$(jq -r .draft "$before")" = false
          before_prerelease="$(jq -r .prerelease "$before")"
          test "$before_prerelease" = true || test "$before_prerelease" = false
          test "$(timeout 60s gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" --jq .id)" = "$release_id"
          test "$(timeout 60s gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha)" = "$RELEASE_COMMIT"
          patch_status=0
          if [ "$before_prerelease" = true ]; then
            timeout 60s gh api --method PATCH "repos/$GH_REPO/releases/$release_id" \
              -F prerelease=false -f make_latest=true >/dev/null || patch_status=$?
          fi
          final_verified=false
          for attempt in 1 2 3; do
            if timeout 60s gh api "repos/$GH_REPO/releases/$release_id" \
              --jq '{id,tag_name,target_commitish,draft,prerelease,assets:[.assets[]|{id,name,size,digest,updated_at}]|sort_by(.name)}' \
              > "$after" \
              && test "$(jq -r .id "$after")" = "$release_id" \
              && test "$(jq -r .draft "$after")" = false \
              && test "$(jq -r .prerelease "$after")" = false
            then
              final_verified=true
              break
            fi
            [ "$attempt" -eq 3 ] || sleep 5
          done
          test "$final_verified" = true
          test "$(jq -r .id "$after")" = "$release_id"
          test "$(jq -r .tag_name "$after")" = "$RELEASE_TAG"
          test "$(jq -r .target_commitish "$after")" = "$RELEASE_COMMIT"
          test "$(jq -r .draft "$after")" = false
          test "$(jq -r .prerelease "$after")" = false
          test "$(timeout 60s gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" --jq .id)" = "$release_id"
          test "$(timeout 60s gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha)" = "$RELEASE_COMMIT"
          jq -S .assets "$before" > "$RUNNER_TEMP/assets-before.json"
          jq -S .assets "$after" > "$RUNNER_TEMP/assets-after.json"
          cmp "$RUNNER_TEMP/assets-before.json" "$RUNNER_TEMP/assets-after.json"
          if [ "$patch_status" -ne 0 ]; then
            echo "promotion PATCH returned $patch_status but the ID-bound final state is verified" >&2
          fi

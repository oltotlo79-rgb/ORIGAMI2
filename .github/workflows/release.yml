name: Cross-platform signed release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]
  workflow_dispatch:
    inputs:
      mode:
        description: "Build only, publish prerelease, publish stable, or promote an existing prerelease"
        required: true
        type: choice
        default: dry-run
        options: [dry-run, prerelease, stable, promote]
      tag:
        description: "Existing signed tag (required except for dry-run)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: formal-release-${{ inputs.tag || github.ref_name || github.sha }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      mode: ${{ steps.contract.outputs.mode }}
      tag: ${{ steps.contract.outputs.tag }}
      version: ${{ steps.contract.outputs.version }}
      commit: ${{ steps.contract.outputs.commit }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event_name == 'push' && github.ref || inputs.tag || github.sha }}
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Import the trusted release-tag verification key
        if: (github.event_name == 'push') || (inputs.mode != 'dry-run')
        env:
          RELEASE_SIGNING_PUBLIC_KEY: ${{ secrets.RELEASE_SIGNING_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_SIGNING_PUBLIC_KEY"
          printf '%s' "$RELEASE_SIGNING_PUBLIC_KEY" | gpg --batch --import
      - id: contract
        env:
          REQUESTED_MODE: ${{ github.event_name == 'push' && 'prerelease' || inputs.mode }}
          REQUESTED_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
        run: node .github/scripts/validate_formal_release.mjs

  build:
    if: needs.validate.outputs.mode != 'promote'
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
          - os: macos-14
            platform: macos-arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate.outputs.tag || github.sha }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - working-directory: apps/desktop
        run: npm ci
      - name: Build Windows portable executable
        if: matrix.platform == 'windows-x64'
        working-directory: apps/desktop
        run: npx tauri build --ci --no-sign --no-bundle
      - name: Sign Windows portable executable
        if: matrix.platform == 'windows-x64' && needs.validate.outputs.mode != 'dry-run'
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD)) {
            throw 'Windows signing credentials are required for publication.'
          }
          $certificate = Join-Path $env:RUNNER_TEMP 'windows-signing.pfx'
          [IO.File]::WriteAllBytes($certificate, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
          $file = (Resolve-Path 'target/release/origami2-desktop.exe').Path
          & signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
            /f $certificate /p $env:CERTIFICATE_PASSWORD $file
          if ($LASTEXITCODE -ne 0) { throw "signtool failed for $file" }
          & signtool verify /pa /all $file
          if ($LASTEXITCODE -ne 0) { throw "signature verification failed for $file" }
      - name: Bundle Windows installer around the tested executable
        if: matrix.platform == 'windows-x64'
        working-directory: apps/desktop
        run: npx tauri bundle --ci --no-sign --bundles nsis
      - name: Sign Windows installer
        if: matrix.platform == 'windows-x64' && needs.validate.outputs.mode != 'dry-run'
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERTIFICATE_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:CERTIFICATE_PASSWORD)) {
            throw 'Windows signing credentials are required for publication.'
          }
          $certificate = Join-Path $env:RUNNER_TEMP 'windows-signing.pfx'
          $file = (Get-ChildItem 'target/release/bundle/nsis' -Filter '*.exe' -File -Recurse -ErrorAction Stop).FullName
          & signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
            /f $certificate /p $env:CERTIFICATE_PASSWORD $file
          if ($LASTEXITCODE -ne 0) { throw "signtool failed for $file" }
          & signtool verify /pa /all $file
          if ($LASTEXITCODE -ne 0) { throw "signature verification failed for $file" }
      - name: Verify Windows installer and portable executable contract
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          SIGNATURE_STATUS: ${{ needs.validate.outputs.mode != 'dry-run' && 'Valid' || 'NotSigned' }}
        run: >
          ./scripts/verify_windows_bundle.ps1
          -BundleDirectory ./target/release/bundle/nsis
          -ExpectedVersion $env:RELEASE_VERSION
          -ExpectedSignatureStatus $env:SIGNATURE_STATUS
          -PortableExecutable ./target/release/origami2-desktop.exe
      - name: Build macOS application
        if: matrix.platform == 'macos-arm64'
        working-directory: apps/desktop
        run: npm run bundle:macos:ci
      - name: Sign macOS application
        if: matrix.platform == 'macos-arm64' && needs.validate.outputs.mode != 'dry-run'
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$SIGNING_IDENTITY"
          keychain="$RUNNER_TEMP/origami2-signing.keychain-db"
          certificate="$RUNNER_TEMP/apple-signing.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$certificate"
          security create-keychain -p temporary "$keychain"
          security unlock-keychain -p temporary "$keychain"
          security import "$certificate" -k "$keychain" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k temporary "$keychain"
          codesign --force --deep --options runtime --timestamp --sign "$SIGNING_IDENTITY" \
            target/release/bundle/macos/ORIGAMI2.app
          codesign --verify --deep --strict --verbose=2 target/release/bundle/macos/ORIGAMI2.app
      - name: Verify macOS application bundle contract
        if: matrix.platform == 'macos-arm64'
        shell: bash
        run: ./.github/scripts/verify_macos_bundle.sh target/release/bundle/macos/ORIGAMI2.app "${{ needs.validate.outputs.version }}"
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: target/formal-release/ORIGAMI2-v${{ needs.validate.outputs.version }}-${{ matrix.platform }}.cdx.json
          upload-artifact: false
      - name: Bind SBOM to source locks, version, commit, and toolchains
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
        run: |
          RUSTC_VERSION="$(rustc --version)" \
          NODE_VERSION="$(node --version)" \
            node .github/scripts/bind_release_sbom.mjs \
              "target/formal-release/ORIGAMI2-v${VERSION}-${PLATFORM}.cdx.json"
      - name: Package platform artifacts
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: ./.github/scripts/package_formal_release.ps1
      - name: Verify local release artifact contract
        env:
          RELEASE_PLATFORM: ${{ matrix.platform }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
          REQUIRE_SIGNATURE: ${{ needs.validate.outputs.mode != 'dry-run' && 'true' || 'false' }}
        run: node .github/scripts/verify_formal_release.mjs target/formal-release
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: formal-release-${{ matrix.platform }}
          path: target/formal-release
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  publish:
    if: needs.validate.outputs.mode == 'prerelease' || needs.validate.outputs.mode == 'stable'
    needs: [validate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: formal-release
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.validate.outputs.tag }}
          persist-credentials: false
      - name: Verify immutable workflow artifact archive digests
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          metadata="$RUNNER_TEMP/formal-release-artifacts.json"
          metadata_headers="$RUNNER_TEMP/formal-release-artifacts.headers"
          curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
            --max-redirs 0 --max-filesize 1048576 \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            --dump-header "$metadata_headers" \
            --output "$metadata" \
            "https://api.github.com/repos/$GH_REPO/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100"
          grep -Eiq '^content-type: application/(json|vnd\.github\+json)(;|\r?$)' "$metadata_headers"
          ! grep -Eiq '^link:.*rel="next"' "$metadata_headers"
          while IFS=$'\t' read -r name artifact_id expected_digest
          do
            archive="$RUNNER_TEMP/$name.zip"
            archive_headers="$RUNNER_TEMP/$name.headers"
            curl --fail --silent --show-error --location --proto '=https' \
              --proto-redir '=https' --tlsv1.2 --max-redirs 1 \
              --max-filesize 2147483648 \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              --dump-header "$archive_headers" \
              --output "$archive" \
              "https://api.github.com/repos/$GH_REPO/actions/artifacts/$artifact_id/zip"
            grep -Eiq '^content-type: (application/zip|application/octet-stream)(;|\r?$)' "$archive_headers"
            actual_digest="$(sha256sum "$archive" | cut -d' ' -f1)"
            test "$actual_digest" = "$expected_digest"
          done < <(node .github/scripts/verify_workflow_artifact_metadata.mjs "$metadata")
      - name: Extract only the digest-verified artifact archives
        run: |
          set -euo pipefail
          mkdir release
          for archive in "$RUNNER_TEMP"/formal-release-*.zip
          do
            archive_bytes="$(stat -c '%s' "$archive")"
            test "$archive_bytes" -gt 0
            test "$archive_bytes" -le 2147483648
            unzip -tqq "$archive"
            entry_count=0
            while IFS= read -r entry
            do
              entry_count=$((entry_count + 1))
              test "$entry_count" -le 16
              test -n "$entry"
              case "$entry" in
                */*|*\\*|.*|*[!A-Za-z0-9._-]*) exit 1 ;;
              esac
            done < <(unzip -Z1 "$archive")
            test "$entry_count" -ge 4
            expanded_bytes="$(unzip -l "$archive" | awk 'END { print $1 }')"
            test "$expanded_bytes" -le 3221225472
            ratio_bound=$((archive_bytes * 200 + 1048576))
            test "$expanded_bytes" -le "$ratio_bound"
            unzip -q "$archive" -d release
          done
          test -z "$(find release -type l -print -quit)"
          test "$(find release -maxdepth 1 -type f | wc -l)" -eq 9
      - name: Verify the complete merged release set before publication
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
        run: node .github/scripts/verify_merged_release_set.mjs release
      - name: Remove temporary artifact transport files
        if: always()
        run: |
          set -euo pipefail
          case "$RUNNER_TEMP" in
            /*) ;;
            *) exit 1 ;;
          esac
          rm -f -- \
            "$RUNNER_TEMP/formal-release-artifacts.json" \
            "$RUNNER_TEMP/formal-release-artifacts.headers" \
            "$RUNNER_TEMP"/formal-release-*.zip \
            "$RUNNER_TEMP"/formal-release-*.headers
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: |
            release/*.exe
            release/*.zip
            release/*.tar.gz
            release/*.cdx.json
            release/*.update.json
            release/SHA256SUMS-*.txt
      - name: Publish immutable tagged release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_MODE: ${{ needs.validate.outputs.mode }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
        run: |
          set -euo pipefail
          created_release_id=''
          draft_created=false
          transaction_name="ORIGAMI2 draft transaction $GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          cleanup_partial_draft() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ] && [ "$draft_created" = true ]; then
              state="$RUNNER_TEMP/partial-release.json"
              if [ -z "$created_release_id" ]; then
                candidate="$RUNNER_TEMP/partial-release-candidate.json"
                if timeout 60s gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" > "$candidate" \
                  && test "$(jq -r .name "$candidate")" = "$transaction_name"
                then
                  created_release_id="$(jq -r .id "$candidate")"
                fi
              fi
              if test -n "$created_release_id" \
                && timeout 60s gh api "repos/$GH_REPO/releases/$created_release_id" > "$state" \
                && test "$(jq -r .name "$state")" = "$transaction_name" \
                && test "$(jq -r .draft "$state")" = true \
                && test "$(jq -r .tag_name "$state")" = "$RELEASE_TAG" \
                && test "$(jq -r .target_commitish "$state")" = "$RELEASE_COMMIT"
              then
                if node .github/scripts/verify_remote_release_assets.mjs \
                  release "$state" --allow-subset
                then
                  timeout 60s gh api --method DELETE "repos/$GH_REPO/releases/$created_release_id"
                fi
              fi
            fi
            exit "$status"
          }
          trap cleanup_partial_draft EXIT
          ! timeout 60s gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1
          remote_commit="$(timeout 60s gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha)"
          test "$remote_commit" = "$RELEASE_COMMIT"
          notes_json="$RUNNER_TEMP/release-notes.json"
          notes_file="$RUNNER_TEMP/release-notes.md"
          timeout 60s gh api --method POST "repos/$GH_REPO/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" -f target_commitish="$RELEASE_COMMIT" \
            > "$notes_json"
          test "$(stat -c '%s' "$notes_json")" -le 1048576
          test "$(jq -r .name "$notes_json")" = "$RELEASE_TAG"
          jq -er '.body | strings' "$notes_json" > "$notes_file"
          created="$RUNNER_TEMP/created-draft-release.json"
          draft_created=true
          timeout 60s gh api --method POST "repos/$GH_REPO/releases" \
            -f tag_name="$RELEASE_TAG" -f target_commitish="$RELEASE_COMMIT" \
            -f name="$transaction_name" -F body=@"$notes_file" \
            -F draft=true -F prerelease=false > "$created"
          created_release_id="$(jq -r .id "$created")"
          test "$created_release_id" -gt 0
          test "$(jq -r .draft "$created")" = true
          test "$(jq -r .tag_name "$created")" = "$RELEASE_TAG"
          test "$(jq -r .target_commitish "$created")" = "$RELEASE_COMMIT"
          for asset in release/*
          do
            state_id="$(timeout 60s gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" --jq .id)"
            test "$state_id" = "$created_release_id"
            timeout 600s gh api --method POST --hostname uploads.github.com \
              "repos/$GH_REPO/releases/$created_release_id/assets?name=$(basename "$asset")" \
              --header 'Content-Type: application/octet-stream' --input "$asset" >/dev/null
          done
          remote_release="$RUNNER_TEMP/remote-draft-release.json"
          timeout 60s gh api "repos/$GH_REPO/releases/$created_release_id" > "$remote_release"
          node .github/scripts/verify_remote_release_assets.mjs release "$remote_release"
          test "$(jq -r .draft "$remote_release")" = true
          test "$(jq -r .tag_name "$remote_release")" = "$RELEASE_TAG"
          test "$(jq -r .target_commitish "$remote_release")" = "$RELEASE_COMMIT"
          test "$(timeout 60s gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" --jq .id)" = "$created_release_id"
          test "$(timeout 60s gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha)" = "$RELEASE_COMMIT"
          publish_prerelease=false
          [ "$RELEASE_MODE" = stable ] || publish_prerelease=true
          timeout 60s gh api --method PATCH "repos/$GH_REPO/releases/$created_release_id" \
            -f name="ORIGAMI2 $RELEASE_TAG" -F draft=false \
            -F prerelease="$publish_prerelease" >/dev/null
          created_release_id=''
          draft_created=false

  promote:
    if: needs.validate.outputs.mode == 'promote'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: formal-release
    permissions:
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
          persist-credentials: false
      - name: Download the existing prerelease assets without rebuilding
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: gh release download "$RELEASE_TAG" --repo "$GH_REPO" --dir release
      - name: Verify the complete immutable asset set
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
        run: node .github/scripts/verify_merged_release_set.mjs release
      - name: Verify build provenance for every published payload
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          for asset in \
            "release/ORIGAMI2-v${RELEASE_VERSION}-windows-x64-setup.exe" \
            "release/ORIGAMI2-v${RELEASE_VERSION}-windows-x64-portable.zip" \
            "release/ORIGAMI2-v${RELEASE_VERSION}-windows-x64.cdx.json" \
            "release/ORIGAMI2-v${RELEASE_VERSION}-windows-x64.update.json" \
            "release/ORIGAMI2-v${RELEASE_VERSION}-macos-arm64-app.tar.gz" \
            "release/ORIGAMI2-v${RELEASE_VERSION}-macos-arm64.cdx.json" \
            "release/ORIGAMI2-v${RELEASE_VERSION}-macos-arm64.update.json" \
            "release/SHA256SUMS-windows-x64.txt" \
            "release/SHA256SUMS-macos-arm64.txt"
          do
            gh attestation verify "$asset" --repo "$GH_REPO"
          done
      - name: Promote the existing prerelease without replacing assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.validate.outputs.commit }}
        run: |
          set -euo pipefail
          before="$RUNNER_TEMP/release-assets-before.json"
          after="$RUNNER_TEMP/release-assets-after.json"
          gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" \
            --jq '{id,tag_name,target_commitish,draft,prerelease,assets:[.assets[]|{id,name,size,digest,updated_at}]|sort_by(.name)}' \
            > "$before"
          release_id="$(jq -r .id "$before")"
          test "$release_id" -gt 0
          test "$(jq -r .tag_name "$before")" = "$RELEASE_TAG"
          test "$(jq -r .target_commitish "$before")" = "$RELEASE_COMMIT"
          test "$(jq -r .draft "$before")" = false
          test "$(jq -r .prerelease "$before")" = true
          test "$(timeout 60s gh api "repos/$GH_REPO/releases/tags/$RELEASE_TAG" --jq .id)" = "$release_id"
          test "$(timeout 60s gh api "repos/$GH_REPO/commits/$RELEASE_TAG" --jq .sha)" = "$RELEASE_COMMIT"
          patch_status=0
          timeout 60s gh api --method PATCH "repos/$GH_REPO/releases/$release_id" \
            -F prerelease=false -f make_latest=true >/dev/null || patch_status=$?
          timeout 60s gh api "repos/$GH_REPO/releases/$release_id" \
            --jq '{id,tag_name,target_commitish,draft,prerelease,assets:[.assets[]|{id,name,size,digest,updated_at}]|sort_by(.name)}' \
            > "$after"
          test "$(jq -r .id "$after")" = "$release_id"
          test "$(jq -r .tag_name "$after")" = "$RELEASE_TAG"
          test "$(jq -r .target_commitish "$after")" = "$RELEASE_COMMIT"
          test "$(jq -r .draft "$after")" = false
          test "$(jq -r .prerelease "$after")" = false
          jq -S .assets "$before" > "$RUNNER_TEMP/assets-before.json"
          jq -S .assets "$after" > "$RUNNER_TEMP/assets-after.json"
          cmp "$RUNNER_TEMP/assets-before.json" "$RUNNER_TEMP/assets-after.json"
          if [ "$patch_status" -ne 0 ]; then
            echo "promotion PATCH returned $patch_status but the ID-bound final state is verified" >&2
          fi
